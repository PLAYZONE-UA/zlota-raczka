<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="google0fdfed3166a281f8" />
    <title>Złota ręczka - Usługi Handymana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0e0e10;
        --amber: #ff8a3d;
        --red: #ff3d3d;
        --white: #f5f3ee;
        --dim: #7a7872;
      }

      body.is-loading {
        overflow: hidden;
      }

      #loader {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
        transition: opacity 0.8s cubic-bezier(0.6, 0, 0.2, 1), filter 0.8s ease;
      }

      #loader.hide {
        opacity: 0;
        filter: blur(10px);
        pointer-events: none;
      }

      .field {
        position: absolute;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 138, 61, 0.18) 0%, rgba(255, 61, 61, 0.06) 45%, transparent 70%);
        animation: field-pulse 2.2s ease-in-out infinite;
      }

      @keyframes field-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }

        50% {
          transform: scale(1.18);
          opacity: 1;
        }
      }

      .crackle {
        position: absolute;
        stroke: var(--amber);
        stroke-width: 2;
        fill: none;
        opacity: 0;
        filter: drop-shadow(0 0 4px var(--amber));
        animation: crackle-flash 2.6s ease-in-out infinite;
      }

      @keyframes crackle-flash {
        0%,
        38% {
          opacity: 0;
        }

        40% {
          opacity: 1;
        }

        46%,
        100% {
          opacity: 0;
        }
      }

      .core {
        position: relative;
        width: 128px;
        height: 128px;
        margin-bottom: 36px;
      }

      .core svg {
        width: 100%;
        height: 100%;
      }

      .ring-outer {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 2;
      }

      .ring-spin {
        fill: none;
        stroke: url(#grad);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 60 220;
        transform-origin: 50% 50%;
        animation: spin-fast 1.1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      @keyframes spin-fast {
        to {
          transform: rotate(360deg);
        }
      }

      .ring-pulse {
        fill: none;
        stroke: var(--red);
        stroke-width: 1.5;
        opacity: 0.5;
        transform-origin: 50% 50%;
        animation: ring-pulse 1.1s ease-out infinite;
      }

      @keyframes ring-pulse {
        0% {
          r: 36;
          opacity: 0.6;
        }

        100% {
          r: 58;
          opacity: 0;
        }
      }

      .core-pct {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 22px;
        color: var(--white);
        font-variant-numeric: tabular-nums;
      }

      .bolt {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .bolt svg {
        width: 34px;
        height: 34px;
        animation: bolt-jolt 1.1s ease-in-out infinite;
      }

      @keyframes bolt-jolt {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.9;
        }

        45% {
          transform: scale(1);
          opacity: 0.9;
        }

        50% {
          transform: scale(1.25);
          opacity: 1;
        }

        55% {
          transform: scale(1);
          opacity: 0.9;
        }
      }

      .wordmark {
        display: flex;
        gap: 1px;
        margin-bottom: 8px;
        overflow: hidden;
      }

      .wordmark span {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: clamp(24px, 5vw, 34px);
        letter-spacing: 1px;
        color: var(--white);
        display: inline-block;
        opacity: 0;
        transform: translateX(40px) skewX(-12deg);
        animation: slam-in 0.5s cubic-bezier(0.2, 0.9, 0.25, 1.1) forwards;
      }

      .wordmark span.accent {
        background: linear-gradient(90deg, var(--amber), var(--red));
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      @keyframes slam-in {
        0% {
          opacity: 0;
          transform: translateX(40px) skewX(-12deg);
        }

        100% {
          opacity: 1;
          transform: translateX(0) skewX(0deg);
        }
      }

      .tagline {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 34px;
        opacity: 0;
        animation: fade-in 0.6s ease forwards;
        animation-delay: 0.6s;
      }

      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }

      .bar-wrap {
        width: 230px;
      }

      .bar-track {
        position: relative;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        overflow: visible;
      }

      .bar-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--amber), var(--red));
        box-shadow: 0 0 12px 1px rgba(255, 90, 50, 0.7);
        transition: width 0.2s cubic-bezier(0.3, 0.7, 0.2, 1);
      }

      .bar-fill::after {
        content: '';
        position: absolute;
        right: -2px;
        top: 50%;
        width: 8px;
        height: 8px;
        background: var(--white);
        border-radius: 50%;
        transform: translateY(-50%);
        box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.9);
      }

      .bar-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 10px;
        letter-spacing: 1.5px;
        color: var(--dim);
        text-transform: uppercase;
      }

      .bar-labels .now {
        color: var(--white);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="loader" role="status" aria-live="polite" aria-label="Ładowanie strony">
      <div class="field" aria-hidden="true"></div>

      <svg class="crackle" style="top: 18%; left: 14%" width="60" height="80" viewBox="0 0 60 80" aria-hidden="true">
        <path d="M30 0 L18 34 L30 34 L14 80 L40 28 L26 28 Z" />
      </svg>
      <svg
        class="crackle"
        style="bottom: 16%; right: 12%; animation-delay: 1.1s"
        width="50"
        height="66"
        viewBox="0 0 60 80"
        aria-hidden="true"
      >
        <path d="M30 0 L18 34 L30 34 L14 80 L40 28 L26 28 Z" />
      </svg>

      <div class="core" aria-hidden="true">
        <svg viewBox="0 0 130 130">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff8a3d" />
              <stop offset="100%" stop-color="#ff3d3d" />
            </linearGradient>
          </defs>
          <circle class="ring-outer" cx="65" cy="65" r="58" />
          <circle class="ring-pulse" cx="65" cy="65" r="36" style="transform-box: fill-box; transform-origin: center" />
          <circle class="ring-spin" cx="65" cy="65" r="58" style="transform-box: fill-box; transform-origin: center" />
        </svg>
        <div class="bolt">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="var(--amber)" />
          </svg>
        </div>
        <div class="core-pct" id="pct">0%</div>
      </div>

      <div class="wordmark" aria-label="Złota Rączka">
        <span style="animation-delay: 0.05s">ZŁOTA</span>
        <span class="accent" style="animation-delay: 0.18s">RĄCZKA</span>
      </div>
      <div class="tagline">Montaż • Naprawa • Instalacja</div>

      <div class="bar-wrap" aria-hidden="true">
        <div class="bar-track"><div class="bar-fill" id="fill"></div></div>
        <div class="bar-labels">
          <span>Ładowanie</span>
          <span class="now" id="pctSmall">0%</span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script>
      (() => {
        const loader = document.getElementById('loader');
        const fill = document.getElementById('fill');
        const pct = document.getElementById('pct');
        const pctSmall = document.getElementById('pctSmall');

        if (!loader || !fill || !pct || !pctSmall) {
          return;
        }

        const minVisibleMs = 3000;
        const startedAt = performance.now();
        let progress = 0;
        let targetProgress = 0;
        let isLoaded = false;

        document.body.classList.add('is-loading');

        const updateVisual = (value) => {
          const safeValue = Math.min(100, Math.max(0, value));
          const rounded = Math.floor(safeValue);
          fill.style.width = `${safeValue}%`;
          pct.textContent = `${rounded}%`;
          pctSmall.textContent = `${rounded}%`;
        };

        const finishLoader = () => {
          loader.classList.add('hide');
          document.body.classList.remove('is-loading');

          loader.addEventListener(
            'transitionend',
            () => {
              loader.remove();
            },
            { once: true },
          );
        };

        const tick = () => {
          const minDurationPassed = performance.now() - startedAt >= minVisibleMs;

          if (!isLoaded || !minDurationPassed) {
            targetProgress = Math.min(93, targetProgress + Math.random() * 1.3 + 0.45);
          } else {
            targetProgress = 100;
          }

          progress += (targetProgress - progress) * 0.1;

          if (isLoaded && minDurationPassed && 100 - progress < 0.35) {
            progress = 100;
          }

          updateVisual(progress);

          if (progress >= 100 && isLoaded && minDurationPassed) {
            finishLoader();
            return;
          }

          window.requestAnimationFrame(tick);
        };

        window.requestAnimationFrame(tick);

        window.addEventListener(
          'load',
          () => {
            isLoaded = true;
          },
          { once: true },
        );

        // Fallback, щоб лоадер не завис у разі проблем із подією load.
        window.setTimeout(() => {
          if (!isLoaded) {
            isLoaded = true;
          }
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
